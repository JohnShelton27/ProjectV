name: Scrape Listings

on:
  schedule:
    # Every 6 hours: midnight, 6am, noon, 6pm UTC
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated sources (zillow,realtor,redfin,trulia)"
        required: false
        default: "zillow,realtor,redfin,trulia"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome dependencies
        run: npx puppeteer browsers install chrome

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          SOURCES="${{ github.event.inputs.sources || 'zillow,realtor,redfin,trulia' }}"
          npx tsx scripts/scrape.ts --sources=$SOURCES
